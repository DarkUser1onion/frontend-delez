name: Build iOS (simulator)

on:
  push:
    branches: [ main, android-build, feature/mobile-build, release/** ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios-sim

      - name: Install dependencies (frontend)
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Install Tauri CLI locally
        working-directory: apps/web
        run: npm install --save-dev @tauri-apps/cli

      - name: Initialize iOS project
        working-directory: apps/web
        run: |
          rm -rf src-tauri/gen/apple
          npx tauri ios init

      - name: Build for iOS
        working-directory: apps/web
        run: |
          npx tauri ios build --target aarch64-sim

      - name: Upload iOS artifact (.app)
        uses: actions/upload-artifact@v4
        with:
          name: delez-ios-test
          path: apps/web/src-tauri/gen/apple/build/arm64-sim/**/*.app
