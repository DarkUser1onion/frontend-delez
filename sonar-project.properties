sonar.projectKey=root_frontend_ae550020-aeb5-45dc-8ce2-75491e105f3a
sonar.projectName=Frontend
sonar.host.url=https://sonar.delez-repo.ru
sonar.token=${SONAR_TOKEN}

sonar.sources=.
sonar.inclusions=apps/web/src/**,auth.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.vscode/**,**/Project_files/**,**/better-auth_migrations/**,**/*.test.*,**/*.spec.*,**/*.stories.*,*.json,*.lock,*.md,**/*.mp4,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.svg,**/*.webp,**/*.woff,**/*.woff2,**/*.ttf,**/*.eot,**/*.otf

sonar.typescript.tsconfigPath=apps/web/tsconfig.json
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info

sonar.coverage.enabled=true

# Исключаем из покрытия: UI-компоненты без логики, точки входа, иконки, страницы-заглушки
sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  apps/web/src/main.tsx,\
  apps/web/src/App.tsx,\
  apps/web/src/vite-env.d.ts,\
  apps/web/src/lib/auth-client.ts,\
  apps/web/src/providers/client.ts,\
  apps/web/src/components/ui/**,\
  apps/web/src/components/icons/**,\
  apps/web/src/components/ParticlesBackground.tsx,\
  apps/web/src/components/LandingFooter.tsx,\
  apps/web/src/components/thread/syntax-highlighter.tsx,\
  apps/web/src/components/thread/markdown-text.tsx,\
  apps/web/src/pages/Privacy.tsx,\
  apps/web/src/pages/NotFound.tsx,\
  apps/web/src/pages/EmailSent.tsx,\
  apps/web/src/pages/Landing.tsx,\
  apps/web/src/pages/BetaTest.tsx,\
  apps/web/src/pages/Experiment.tsx,\
  apps/web/src/pages/GraphPage.tsx,\
  apps/web/src/pages/Event.tsx
sonar.sourceEncoding=UTF-8

# Отключаем правило для неизвестных CSS at-rules (для Tailwind CSS v4 @theme)
sonar.css.stylelint.reportPaths=
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4658
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.css
